<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AIOSON · Demo de tema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens/index.css" />
<link rel="stylesheet" href="../assets/components/command-dock.css" />
<link rel="stylesheet" href="../assets/components/aurora-rail.css" />
<link rel="stylesheet" href="../assets/components/account-menu.css" />
<style>
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 0%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 30%),
      radial-gradient(circle at 86% 0%, color-mix(in srgb, var(--accent-2) 12%, transparent), transparent 28%),
      radial-gradient(circle at 50% 16%, color-mix(in srgb, var(--accent-4) 8%, transparent), transparent 30%),
      linear-gradient(180deg, var(--panel-strong) 0%, var(--bg) 60%, var(--bg-deep) 100%);
  }
  [data-theme="dark"] body {
    background:
      radial-gradient(circle at 14% 0%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 32%),
      radial-gradient(circle at 88% 6%, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 28%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 50%, var(--bg-deep) 100%);
  }
  .wrap { max-width: 1280px; margin: 0 auto; }
  .panels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 16px; }
  .panel {
    padding: 24px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    background: color-mix(in srgb, var(--panel-strong) 88%, transparent);
    box-shadow: var(--marketing-shadow);
  }
  .panel-title {
    font-family: var(--font-mono);
    font-size: .68rem; font-weight: 600;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
  }
  .panel-value {
    font-size: 2rem; font-weight: 700;
    letter-spacing: -.04em;
    color: var(--text-soft);
    margin: 0 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .panel-meta { color: var(--muted); font-size: .82rem; margin: 0; }
  .swatches { display: flex; gap: 10px; margin-top: 14px; }
  .swatch { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); }
</style>
</head>
<body data-auth-state="logged">

<div class="wrap">

  <header class="cmd-dock" role="banner">
    <div class="cmd-brand">
      <span class="cmd-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none" stroke="url(#g1)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4 4 26h6l2-4h8l2 4h6L16 4z"/>
          <path d="M14 18h4"/>
          <defs>
            <linearGradient id="g1" x1="0" x2="32" y1="0" y2="32">
              <stop offset="0" stop-color="#5ec8ff"/>
              <stop offset="1" stop-color="#7a6cff"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <div class="cmd-brand-info">
        <span class="cmd-brand-title">aioson</span>
        <span class="cmd-brand-sub"><span class="cmd-status-dot"></span> demo · troque o tema</span>
      </div>
    </div>
    <div class="cmd-center">
      <nav class="cmd-nav">
        <a href="#" class="cmd-nav-item" aria-current="page">Tema</a>
        <a href="#" class="cmd-nav-item">Tokens</a>
        <a href="#" class="cmd-nav-item">Components</a>
      </nav>
    </div>
    <div class="cmd-actions">
      <button class="cmd-icon-btn" type="button" aria-label="Alternar tema" data-theme-toggle>
        <svg class="cmd-theme-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 9.2A5.5 5.5 0 1 1 6.8 3a4.4 4.4 0 0 0 6.2 6.2z"/></svg>
        <svg class="cmd-theme-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1.6M8 12.9v1.6M2.4 8H1M15 8h-1.4M3.6 3.6l1 1M11.4 11.4l1 1M3.6 12.4l1-1M11.4 4.6l1-1"/></svg>
      </button>
    </div>
  </header>

  <h1 style="margin: 24px 0 4px; font-size: 2rem; letter-spacing: -.04em;">Tema vivo</h1>
  <p style="color: var(--muted); margin: 0 0 24px;">Clique no botão de lua/sol no canto superior. Os tokens fluem automaticamente.</p>

  <div class="panels">
    <div class="panel">
      <p class="panel-title">▸ squads ativas</p>
      <p class="panel-value" style="color: var(--accent)">248</p>
      <p class="panel-meta">+12 esta semana</p>
      <div class="swatches">
        <span class="swatch" style="background: var(--accent)"></span>
        <span class="swatch" style="background: var(--accent-strong)"></span>
        <span class="swatch" style="background: color-mix(in srgb, var(--accent-soft) 60%, var(--panel))"></span>
      </div>
    </div>
    <div class="panel">
      <p class="panel-title">◆ genomes</p>
      <p class="panel-value" style="color: var(--accent-2)">1.4<span style="font-size: .5em">k</span></p>
      <p class="panel-meta">142 downloads hoje</p>
      <div class="swatches">
        <span class="swatch" style="background: var(--accent-2)"></span>
        <span class="swatch" style="background: color-mix(in srgb, var(--accent-2) 70%, var(--panel))"></span>
        <span class="swatch" style="background: color-mix(in srgb, var(--accent-2-soft) 60%, var(--panel))"></span>
      </div>
    </div>
    <div class="panel">
      <p class="panel-title">★ skills</p>
      <p class="panel-value" style="color: var(--accent-3)">3.2<span style="font-size: .5em">k</span></p>
      <p class="panel-meta">média 4.7★</p>
      <div class="swatches">
        <span class="swatch" style="background: var(--accent-3)"></span>
        <span class="swatch" style="background: var(--accent-4)"></span>
        <span class="swatch" style="background: color-mix(in srgb, var(--accent-4-soft) 60%, var(--panel))"></span>
      </div>
    </div>
  </div>
</div>

<script src="../assets/components/theme-toggle.js"></script>
</body>
</html>
